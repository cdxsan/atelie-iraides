<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ateliê Iraides</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background-color: #ff6b6b;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo svg {
      width: 36px;
      height: 36px;
      fill: #121212;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 17px;
      font-weight: 400;
      color: #a0a0a0;
      line-height: 1.5;
      max-width: 340px;
      margin-bottom: 32px;
    }

    .tagline strong {
      color: #ff6b6b;
      font-weight: 600;
    }

    .divider {
      width: 40px;
      height: 3px;
      background-color: #ff6b6b;
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .description {
      font-size: 15px;
      color: #808080;
      line-height: 1.6;
      max-width: 340px;
      margin-bottom: 36px;
    }

    .cta {
      display: inline-block;
      background-color: #ff6b6b;
      color: #121212;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 8px;
      transition: background-color 0.2s;
    }

    .cta:hover {
      background-color: #ff5252;
    }

    .cta:active {
      background-color: #ff5252;
    }

    .instagram-link {
      margin-top: 20px;
      font-size: 14px;
    }

    .instagram-link a {
      color: #ff6b6b;
      text-decoration: none;
      font-weight: 500;
    }

    .instagram-link a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 48px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M7 2C4.243 2 2 4.243 2 7v10c0 2.757 2.243 5 5 5h10c2.757 0 5-2.243 5-5V7c0-2.757-2.243-5-5-5H7zm0 2h10c1.654 0 3 1.346 3 3v10c0 1.654-1.346 3-3 3H7c-1.654 0-3-1.346-3-3V7c0-1.654 1.346-3 3-3zm5 3c-2.757 0-5 2.243-5 5s2.243 5 5 5 5-2.243 5-5-2.243-5-5-5zm0 2c1.654 0 3 1.346 3 3s-1.346 3-3 3-3-1.346-3-3 1.346-3 3-3zm5-3c-.6 0-1 .4-1 1s.4 1 1 1 1-.4 1-1-.4-1-1-1z"/>
    </svg>
  </div>

  <h1>Ateliê Iraides</h1>

  <p class="tagline">
    O link da bio que transforma <strong>seguidores em clientes</strong>
  </p>

  <div class="divider"></div>

  <p class="description">
    Se você viu um vestido no Instagram e quer comprar, o Ateliê Iraides é o caminho.<br>
    Produto certo, frete calculado na hora e pagamento pelo PIX.
  </p>

  <a href="#" class="cta" onclick="return false;">VER VESTIDOS</a>

  <p class="instagram-link">
    <a href="#" onclick="return false;">@iraides.atelie</a>
  </p>

  <footer>
    Aparecida de Goiânia — GO
  </footer>
</body>
</html>
