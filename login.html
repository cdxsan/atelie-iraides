<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Entrar — Ateliê Iraides</title>
  <link rel="stylesheet" href="css/estilo.css">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="top-bar">
    <div class="top-bar-inner">
      <a href="index.html" class="top-bar-logo">
        <svg class="logo-icon" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 4C10 4 8 7 8 9l-3 6 2 2 4-2-1 9h8l-1-9 4 2 2-2-3-6c0-2-2-5-6-5z" stroke="#ff6b6b" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
        </svg>
        Ateliê <span>Iraides</span>
      </a>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">☰</button>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="catalogo.html">Catálogo</a>
        <span class="nav-divider"></span>
        <span class="nav-label">Protegido</span>
        <a href="pedidos.html">Pedidos</a>
        <a href="novo-pedido.html">Novo Pedido</a>
        <span class="nav-divider"></span>
        <a href="login.html" class="entrar ativo" id="nav-entrar">Entrar</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="login-box">
      <h1>Entrar</h1>

      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input class="form-input" type="email" id="email" placeholder="iraides@email.com" value="iraides@email.com">
      </div>

      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-input" type="password" id="senha" placeholder="••••••••" value="123456">
      </div>

      <button class="btn btn-primary" onclick="simularLogin()">Entrar</button>

      <p class="login-simulacao">
        Login real com Supabase estará disponível no dia 5.<br>
        Por enquanto, clique em <strong>Entrar</strong> para simular.
      </p>
    </div>
  </main>

  <div id="aviso-futuro" class="aviso-futuro"></div>

  <script src="js/app.js"></script>
</body>
</html>
